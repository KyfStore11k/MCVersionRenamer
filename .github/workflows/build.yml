# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a package using Gradle and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#Publishing-using-gradle

name: Gradle Package

on:
  [push, workflow_dispatch]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up JDK 21
        uses: actions/setup-java@v4.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up JDK 25
        uses: actions/setup-java@v4.4.0
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.5.0'

      - name: Grant execute permission to Root Gradle Wrapper
        run: chmod +x gradlew

      - name: Build v1.21.4
        run: ./gradlew :v1.21.4:build

      - name: Build v1.21.5
        run: ./gradlew :v1.21.5:build

      - name: Build v1.21.11
        run: ./gradlew :v1.21.11:build

      - name: Build v26.1.2
        run: ./gradlew :v26.1.2:build

      - name: Build v26.2
        run: ./gradlew :v26.2:build


      - name: Upload v1.21.4 Build Artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: v1.21.4
          path: ${{ github.workspace }}/v1.21.4/build/libs/**.jar

      - name: Upload v1.21.5 Build Artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: v1.21.5
          path: ${{ github.workspace }}/v1.21.5/build/libs/**.jar

      - name: Upload v1.21.11 Build Artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: v1.21.11
          path: ${{ github.workspace }}/v1.21.11/build/libs/**.jar

      - name: Upload v26.1.2 Build Artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: v26.1.2
          path: ${{ github.workspace }}/v26.1.2/build/libs/**.jar

      - name: Upload v26.2 Build Artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: v26.2
          path: ${{ github.workspace }}/v26.2/build/libs/**.jar